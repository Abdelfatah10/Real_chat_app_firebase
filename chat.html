<!DOCTYPE html>

<html class="h-full bg-gray-50" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0" name="viewport"/>
<meta name="apple-mobile-web-app-capable" content="true"/>
<title>Minimal Chat Dashboard</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        screens: {
          'xs': '375px',
        }
      }
    }
  }
</script>
<style data-purpose="custom-scrollbar">
    /* Custom scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #d1d5db;
    }
  </style>
<style data-purpose="layout-tweaks">
    /* Ensure the dashboard takes up full height without body scrolling */
    body {
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    .chat-container {
      height: calc(100vh - 0.25rem);
      border-radius: 0;
    }
    @media (min-width: 640px) {
      .chat-container {
        height: calc(100dvh - 0.25rem);
      }
    }
    /* Overlay backdrop for mobile sidebar */
    #sidebar-overlay {
      display: none;
    }
    #sidebar-overlay.active {
      display: block;
    }
    /* Prevent scrolling when sidebar is open */
    body.sidebar-open {
      overflow-x: hidden;
    }
    /* Better touch interaction on mobile */
    button, a {
      -webkit-tap-highlight-color: rgba(59, 130, 246, 0.1);
      touch-action: manipulation;
    }
    /* User list improvements */
    #users-list {
      /* Smooth scrolling */
      scroll-behavior: smooth;
    }
    #users-list > div {
      /* Smooth selection transition */
      transition: all 200ms ease-in-out;
    }
    #users-list > div[data-selected="true"] {
      background-color: #ddeaf8;
      box-shadow: none;
    }
    @media (prefers-color-scheme: dark) {
      #users-list > div[data-selected="true"] {
        background-color: #1a3a52;
      }
    }
    /* Message area spacing on mobile */
    @media (max-width: 639px) {
      #message-container {
        scroll-behavior: smooth;
      }
    }
    /* Responsive breakpoint */
    @media (max-width: 374px) {
      h1, h2 {
        font-size: 0.875rem;
      }
      input {
        font-size: 14px;
      }
    }
    /* iOS safe area support */
    @supports (padding: max(0px)) {
      body {
        padding-left: max(1px, env(safe-area-inset-left));
        padding-right: max(1px, env(safe-area-inset-right));
      }
    }
    /* Prevent zoom on input focus in iOS */
    input, textarea, select {
      font-size: 16px;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center p-1 xs:p-1 sm:p-4">
<!-- Sidebar Overlay (Mobile) -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/40 z-30 sm:hidden" onclick="document.getElementById('sidebar').classList.add('hidden')"></div>
<!-- Global Loading Spinner -->
<div id="dashboard-loading-spinner" class="absolute inset-0 flex items-center justify-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-sm z-50">
<div class="flex flex-col items-center gap-4">
<div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
<p class="text-sm text-gray-600">Loading chat...</p>
</div>
</div>
<!-- BEGIN: MainDashboardContainer -->
<main class="chat-container w-full h-[calc(100dvh-0.25rem)] sm:h-[calc(100vh-2rem)] max-w-7xl bg-white sm:rounded-2xl shadow-none sm:shadow-xl flex overflow-hidden border-0 sm:border border-gray-100" data-purpose="dashboard-wrapper">
<!-- BEGIN: LeftSidebar -->
<aside id="sidebar" class="hidden sm:flex sm:w-64 lg:w-80 border-r border-gray-100 flex-col bg-gray-50/50 fixed sm:static h-full sm:h-auto z-40 w-full top-0 left-0 sm:z-auto transition-all duration-300" data-purpose="sidebar">
<!-- Sidebar Header & Search -->
<div class="p-6 xs:p-7 sm:p-4 space-y-4 xs:space-y-4 sm:space-y-4">
<div class="flex items-center justify-between">
<h1 class="text-base sm:text-xl font-bold text-gray-800">Messages</h1>
<div class="flex items-center gap-2">
<button id="sidebar-close-btn" class="sm:hidden p-2 hover:bg-gray-200 rounded-full transition-colors">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button class="p-2 hover:bg-gray-200 rounded-full transition-colors">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
<div class="relative">
<input class="w-full pl-9 pr-3 py-1.5 sm:py-2 bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all outline-none text-xs sm:text-sm" placeholder="Search contacts..." type="text" id="search-input"/>
<svg class="h-3.5 w-3.5 sm:h-4 sm:w-4 absolute left-3 top-2 sm:top-3 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
<!-- Contact List -->
<div class="flex-1 overflow-y-auto" data-purpose="contact-list" id="users-list-container">
<!-- Users will be populated by JavaScript -->
</div>
<!-- Sidebar Footer: Google Sign-In Integrated -->
<div class="p-6 xs:p-7 sm:p-4 border-t border-gray-100 bg-white" data-purpose="user-auth-section">
<div class="flex items-center justify-between mb-3 sm:mb-4">
<div class="flex items-center space-x-2 min-w-0">
<div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
<svg class="h-3 w-3 sm:h-4 sm:w-4 text-gray-500" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-xs sm:text-sm font-medium text-gray-600 truncate" id="current-user-name">Loading...</span>
</div>
</div>
<!-- Logout Button -->
<button id="logout-btn" class="w-full flex items-center justify-center space-x-2 px-3 sm:px-4 py-1.5 sm:py-2 border border-red-300 rounded-lg bg-red-50 text-xs sm:text-sm font-medium text-red-700 hover:bg-red-100 transition-colors shadow-sm">
<svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
</svg>
<span class="hidden xs:inline">Logout</span>
</button>
</div>
</aside>
<!-- END: LeftSidebar -->
<!-- BEGIN: MainChatArea -->
<section class="flex-1 flex flex-col bg-white w-full sm:flex-1" data-purpose="chat-view">
<!-- Chat Header -->
<header class="h-12 xs:h-13 sm:h-16 border-b border-gray-100 flex items-center justify-between px-2 xs:px-3 sm:px-6 shrink-0 gap-2">
<div class="flex items-center gap-1.5 sm:gap-3 flex-1 min-w-0">
<button id="sidebar-toggle-btn" class="sm:hidden p-1.5 hover:bg-gray-100 rounded-lg transition-colors flex-shrink-0">
<svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<div id="selected-user-info" class="hidden flex items-center gap-1.5 sm:gap-3 flex-1 min-w-0">
<div class="relative flex-shrink-0">
<img alt="Selected User" class="w-7 h-7 sm:w-10 sm:h-10 rounded-full" id="selected-user-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect fill='%23e5e7eb' width='24' height='24'/%3E%3C/svg%3E"/>
<span class="absolute bottom-0 right-0 block h-1.5 w-1.5 sm:h-2.5 sm:w-2.5 rounded-full bg-gray-400 ring-2 ring-white"></span>
</div>
<div class="min-w-0">
<h2 class="text-xs sm:text-sm font-bold text-gray-800 truncate" id="selected-user-name">Select a contact</h2>
<p class="text-[9px] sm:text-[11px] text-gray-500 font-medium truncate" id="selected-user-status-text">Offline</p>
</div>
</div>
</header>
<!-- Message History -->
<div class="flex-1 overflow-y-auto px-6 xs:px-8 sm:px-6 py-12 xs:py-16 sm:py-8 space-y-4 xs:space-y-5 sm:space-y-6" data-purpose="message-history" id="message-container">
<!-- Messages will be populated by JavaScript -->
</div>
<!-- Chat Input -->
<div id="chat-input-container" class="hidden px-4 xs:px-6 sm:p-4 pt-6 xs:pt-8 sm:pt-4 pb-8 xs:pb-10 sm:pb-4 border-t border-gray-100 bg-white" data-purpose="chat-input-container">
<form class="flex items-end gap-1.5 xs:gap-2 sm:gap-3" id="chat-form">
<button class="hidden xs:block p-1.5 text-gray-400 hover:text-blue-500 transition-colors flex-shrink-0" type="button">
<svg class="h-4 w-4 sm:h-6 sm:w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<div class="flex-1 relative min-w-0">
<input class="w-full py-2 xs:py-2 sm:py-3 px-2.5 xs:px-3 sm:px-4 bg-gray-50 border-none rounded-lg xs:rounded-2xl focus:ring-2 focus:ring-blue-400 transition-all outline-none text-xs xs:text-sm" id="message-input" placeholder="Message..." type="text"/>
<div id="emoji-picker-panel" class="hidden absolute bottom-full right-0 mb-2 bg-white border border-gray-200 rounded-lg shadow-lg z-50 p-3 grid grid-cols-6 gap-2 max-w-xs">
<!-- Emojis will be populated by JavaScript -->
</div>
<button id="emoji-btn" class="hidden xs:block absolute right-1.5 xs:right-2 sm:right-3 top-2 xs:top-2 sm:top-2.5 text-gray-400 hover:text-blue-500 flex-shrink-0" type="button">
<svg class="h-4 w-4 sm:h-6 sm:w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<button class="bg-blue-500 text-white p-2 xs:p-2 sm:p-3 rounded-lg xs:rounded-xl hover:bg-blue-600 transition-all shadow-lg shadow-blue-300 flex-shrink-0 min-h-[2.25rem] min-w-[2.25rem]" id="send-btn" type="button">
<svg class="h-5 w-5 sm:h-5 sm:w-5 transform rotate-90 mx-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</form>
</div>
</section>
<!-- END: MainChatArea -->
</main>
<!-- END: MainDashboardContainer -->
<script type="module" src="./js/chat.js"></script>
</body>
</html>
