<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Real-Time Chat | Connect Instantly</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                "primary": "#258cf4",
                "background-light": "#f5f7f8",
                "background-dark": "#101922",
                },
                fontFamily: {
                "display": ["Inter", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
            },
        }
        </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<!-- Top Navigation Bar -->
    <header class="w-full border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-xl">forum</span>
                </div>
                <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">Real-Time Chat</h2>
            </div>
        </div>
    </header>
    <!-- Main Content Area -->
    <main class="min-h-[calc(100vh-128px)] flex flex-col items-center justify-center px-6 relative overflow-hidden">
        <!-- Subtle Background Gradients -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 opacity-30 pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[100px]"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[100px]"></div>
        </div>
        <!-- Hero Section -->
        <div class="max-w-4xl w-full text-center space-y-8">
            <div class="space-y-4">
                <h1 class="text-5xl md:text-7xl font-black text-slate-900 dark:text-slate-100 tracking-tight leading-[1.1]">
                        Chat in Real-Time <br/>
                    <span class="text-primary">with Your Friends</span>
                </h1>
                <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 font-medium max-w-xl mx-auto">
                    Fast, simple, and secure messaging. Experience seamless communication without boundaries.
                </p>
            </div>
        <div class="flex flex-col items-center gap-4 pt-4">
            <button class="flex items-center gap-3 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all duration-200 px-8 py-4 rounded-xl shadow-lg shadow-slate-200/50 dark:shadow-none font-bold text-lg group" id="SignGoogle">
                <svg class="w-6 h-6" viewbox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 1２s.43 3.12 4.18 4.77l2.66-2.66z" fill="#FBBC05"></path>
                    <path d="M12 5.38c1.62 0 3.07.56 4.21 1.66l3.15-3.15C17.45 2.08 14.97 1 12 1c-4.3 0-7.99 2.47-9.31 6.16l3.66 2.84c.87-2.6 3.3-4.53 6.65-4.53z" fill="#EA4335"></path>
                </svg>
                Continue with Google
                <span class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </button>
        </div>
    </main>
</body>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    

    const firebaseConfig = {
        apiKey: "AIzaSyDWY4_Qu891TbNPCGdhC_Vqd70Oai3OPyM",
        authDomain: "test-dd24c.firebaseapp.com",
        databaseURL: "https://test-dd24c-default-rtdb.firebaseio.com",
        projectId: "test-dd24c",
        storageBucket: "test-dd24c.firebasestorage.app",
        messagingSenderId: "608816722136",
        appId: "1:608816722136:web:8bfe2f6e2759c16e98a7ad",
        measurementId: "G-2HG25VYL99"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    const signInButton = document.querySelector("button");
    signInButton.addEventListener("click", async () => {
        try {
            const provider = new GoogleAuthProvider();
            const result = await signInWithPopup(auth, provider);

            const user = result.user;

            await saveUserData(user);

            const snapshot = await get(ref(database, "users/" + user.uid));

            if (snapshot.exists()) {
                const userData = snapshot.val();

                localStorage.setItem("currentUser", JSON.stringify({
                    uid: user.uid,
                    name: userData.name,
                    email: userData.email,
                    profile_picture: userData.profile_picture
                }));
            }

            window.location.href = "./chat.html";

        } catch (error) {
            console.error("Error during sign-in:", error);
            alert("An error occurred during sign-in.");
        }
    });

    async function saveUserData(user) {
        try {
            await set(ref(database, "users/" + user.uid), {
                name: user.displayName,
                email: user.email,
                profile_picture: user.photoURL,
                lastSeen: Date.now()
            });
        } catch (error) {
            console.error("Error saving user data:", error);
        }
    }
</script>
</html>
